<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>iShareProfit – Transactions</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f2f8;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ══ SIDEBAR ══ */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.45); z-index: 200;
    }
    .overlay.open { display: block; }

    .sidebar {
      position: fixed; top: 0; left: 0;
      width: 290px; height: 100%;
      background: linear-gradient(180deg,#1a2a6c,#1e3a8a 60%,#1a2a6c);
      z-index: 300; transform: translateX(-100%);
      transition: transform .3s ease;
      display: flex; flex-direction: column;
    }
    .sidebar.open { transform: translateX(0); }

    .sidebar-logo {
      background:#000; padding:18px 20px;
      display:flex; align-items:center; justify-content:space-between;
    }
    .sidebar-logo img { height:60px; object-fit:contain; }
    .sidebar-close {
      color:#fff; font-size:26px; cursor:pointer;
      background:none; border:none;
    }
    .nav-list { padding:14px 0; flex:1; }
    .nav-item {
      display:flex; align-items:center; gap:16px;
      padding:16px 22px; color:#fff; font-size:17px; font-weight:500;
      cursor:pointer; text-decoration:none; transition:background .2s;
    }
    .nav-item:hover { background:rgba(255,255,255,.08); }
    .nav-item.active {
      background:#2563eb; border-radius:0 30px 30px 0; margin-right:20px;
    }
    .nav-icon {
      width:42px; height:42px; border:2px solid rgba(255,255,255,.5);
      border-radius:10px; display:flex; align-items:center;
      justify-content:center; flex-shrink:0;
    }
    .nav-item.active .nav-icon {
      background:rgba(255,255,255,.15); border-color:rgba(255,255,255,.8);
    }
    .nav-icon svg { width:22px; height:22px; fill:#fff; }
    .nav-arrow { margin-left:auto; font-size:18px; color:rgba(255,255,255,.6); }

    /* ══ HEADER ══ */
    .top-header {
      background:linear-gradient(135deg,#1a2a6c,#1e3a8a);
      padding:14px 18px; display:flex; align-items:center;
      justify-content:space-between; position:sticky; top:0; z-index:100;
    }
    .avatar {
      width:44px; height:44px; border-radius:50%;
      background:rgba(255,255,255,.25);
      display:flex; align-items:center; justify-content:center;
    }
    .avatar svg { width:36px; height:36px; fill:rgba(255,255,255,.8); }
    .hamburger {
      background:none; border:none; cursor:pointer;
      display:flex; flex-direction:column; gap:5px; padding:4px;
    }
    .hamburger span { display:block; width:26px; height:3px; background:#fff; border-radius:3px; }

    /* ══ BANNER ══ */
    .dash-banner {
      background:linear-gradient(135deg,#6c1a7a,#9b2dae,#6c1a7a);
      padding:22px 20px 50px;
    }
    .dash-banner h1 { color:#fff; font-size:28px; font-weight:700; margin-bottom:6px; }
    .breadcrumb {
      color:rgba(255,255,255,.75); font-size:13px; font-weight:500;
      letter-spacing:.5px; display:flex; align-items:center; gap:8px;
    }
    .breadcrumb span { color:rgba(255,255,255,.5); }

    /* ══ CARD ══ */
    .card {
      background:#fff; border-radius:20px 20px 0 0;
      margin:-28px 0 0; padding:28px 18px 36px;
      min-height: 60vh;
    }

    .card-title {
      font-size:20px; font-weight:800; color:#1a1a2e;
      margin-bottom:20px; display:flex; align-items:center; gap:10px;
    }
    .card-title .badge {
      background:#f0f0f0; color:#666; font-size:13px;
      padding:4px 12px; border-radius:20px; font-weight:600;
    }

    /* ══ FILTER ROW ══ */
    .filter-row {
      display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap;
    }
    .filter-btn {
      padding:10px 18px; border:1.5px solid #d0d0d0;
      border-radius:25px; background:#fff; color:#555;
      font-size:14px; font-weight:600; cursor:pointer;
      transition:all .2s; white-space:nowrap;
    }
    .filter-btn:hover { border-color:#1a2a6c; color:#1a2a6c; }
    .filter-btn.active {
      background:#1a2a6c; color:#fff; border-color:#1a2a6c;
    }

    /* ══ TRANSACTION LIST ══ */
    .txn-list {
      display:flex; flex-direction:column; gap:12px;
    }

    .txn-item {
      display:flex; align-items:center; gap:14px;
      padding:16px 14px; border-radius:14px;
      background:#f9fafb; border:1px solid #eee;
      transition:box-shadow .2s;
    }
    .txn-item:hover { box-shadow:0 2px 12px rgba(0,0,0,.06); }

    .txn-icon {
      width:48px; height:48px; border-radius:12px;
      display:flex; align-items:center; justify-content:center;
      flex-shrink:0;
    }
    .txn-icon.deposit  { background:#e8f5e9; }
    .txn-icon.withdraw { background:#fce4ec; }
    .txn-icon.bonus    { background:#e3f2fd; }
    .txn-icon svg { width:24px; height:24px; }
    .txn-icon.deposit svg  { fill:#2e7d32; }
    .txn-icon.withdraw svg { fill:#c62828; }
    .txn-icon.bonus svg    { fill:#1565c0; }

    .txn-info { flex:1; min-width:0; }
    .txn-type {
      font-size:15px; font-weight:700; color:#1a1a2e;
      margin-bottom:3px;
    }
    .txn-date {
      font-size:12px; color:#888; font-weight:500;
    }

    .txn-amount {
      font-size:16px; font-weight:800; text-align:right;
      white-space:nowrap;
    }
    .txn-amount.credit { color:#2e7d32; }
    .txn-amount.debit  { color:#c62828; }

    .txn-status {
      font-size:11px; font-weight:700; padding:4px 10px;
      border-radius:12px; text-transform:uppercase;
      letter-spacing:.5px;
    }
    .txn-status.completed { background:#e8f5e9; color:#2e7d32; }
    .txn-status.pending   { background:#fff3e0; color:#e65100; }
    .txn-status.failed    { background:#fce4ec; color:#c62828; }

    /* ══ EMPTY STATE ══ */
    .empty-state {
      text-align:center; padding:60px 20px;
    }
    .empty-state svg { width:80px; height:80px; fill:#ccc; margin-bottom:16px; }
    .empty-state h3 { font-size:18px; color:#888; font-weight:600; margin-bottom:6px; }
    .empty-state p  { font-size:14px; color:#aaa; }

    /* ══ LOADING ══ */
    .loading-spinner {
      text-align:center; padding:40px 20px;
    }
    .loading-spinner .spinner {
      display:inline-block; width:40px; height:40px;
      border:4px solid #e0e0e0; border-top-color:#1a2a6c;
      border-radius:50%; animation:spin .8s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* ══ Toast ══ */
    .toast {
      position:fixed; bottom:28px; left:50%;
      transform:translateX(-50%) translateY(80px);
      background:#1a1a2e; color:#fff; padding:12px 22px;
      border-radius:30px; font-size:14px; opacity:0;
      transition:all .35s ease; z-index:9999; white-space:nowrap;
    }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
    .toast.success { background:#28a745; }
    .toast.error   { background:#dc3545; }

    /* ══ Footer ══ */
    footer {
      text-align:center; padding:20px;
      font-size:13px; color:#888;
      background:#f0f2f8;
    }
  </style>
</head>
<body>

  <!-- OVERLAY -->
  <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <img src="image.jpg" alt="iShareProfit"/>
      <button class="sidebar-close" onclick="closeSidebar()">✕</button>
    </div>
    <nav class="nav-list">
      <a href="home.html" class="nav-item">
        <div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></div>
        Dashboard <span class="nav-arrow">›</span>
      </a>
      <a href="deposit.html" class="nav-item">
        <div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M21 18v1a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v1h-9a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h9zm-9-2h10V8H12v8zm4-2.5a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3z"/></svg></div>
        Deposit <span class="nav-arrow">›</span>
      </a>
      <a href="transactions.html" class="nav-item active">
        <div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 3c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm7 13H5v-.23c0-.62.28-1.2.76-1.58C7.47 15.82 9.64 15 12 15s4.53.82 6.24 2.19c.48.38.76.97.76 1.58V19z"/></svg></div>
        Transactions <span class="nav-arrow">›</span>
      </a>
      <a href="withdraw.html" class="nav-item">
        <div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M20 4H4c-1.11 0-2 .89-2 2v12c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z"/></svg></div>
        Withdraw <span class="nav-arrow">›</span>
      </a>
      <a href="settings.html" class="nav-item">
        <div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.06-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96a6.96 6.96 0 0 0-1.62-.94l-.36-2.54A.484.484 0 0 0 14 2h-4a.484.484 0 0 0-.48.41l-.36 2.54a7.3 7.3 0 0 0-1.62.94l-2.39-.96a.48.48 0 0 0-.59.22L2.74 8.87a.48.48 0 0 0 .12.61l2.03 1.58c-.04.3-.06.62-.06.94s.02.64.06.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.36 1.04.67 1.62.94l.36 2.54c.05.24.27.41.48.41h4c.24 0 .44-.17.48-.41l.36-2.54a7.3 7.3 0 0 0 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32a.49.49 0 0 0-.12-.61l-2.03-1.58zM12 15.6a3.6 3.6 0 1 1 0-7.2 3.6 3.6 0 0 1 0 7.2z"/></svg></div>
        Settings <span class="nav-arrow">›</span>
      </a>
      <a href="security.html" class="nav-item">
        <div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 4a3 3 0 1 1 0 6 3 3 0 0 1 0-6zm0 14c-2.67 0-5.01-1.37-6.4-3.44.75-1.1 3.45-1.56 6.4-1.56s5.65.46 6.4 1.56C17.01 17.63 14.67 19 12 19z"/></svg></div>
        Security <span class="nav-arrow">›</span>
      </a>
      <a href="login.html" class="nav-item" onclick="logout()">
        <div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M10.09 15.59L11.5 17l5-5-5-5-1.41 1.41L12.67 11H3v2h9.67l-2.58 2.59zM19 3H5a2 2 0 0 0-2 2v4h2V5h14v14H5v-4H3v4a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2z"/></svg></div>
        Logout <span class="nav-arrow">›</span>
      </a>
    </nav>
  </div>

  <!-- ══════════════ MAIN CONTENT ══════════════ -->
  <div class="top-header">
    <div class="avatar">
      <svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
    </div>
    <button class="hamburger" onclick="openSidebar()">
      <span></span><span></span><span></span>
    </button>
  </div>

  <div class="dash-banner">
    <h1>Transactions</h1>
    <div class="breadcrumb">HOME <span>→</span> TRANSACTIONS</div>
  </div>

  <div class="card">
    <div class="card-title">
      Transaction History
      <span class="badge" id="txnCount">0</span>
    </div>

    <!-- Filter Buttons -->
    <div class="filter-row">
      <button class="filter-btn active" data-filter="all" onclick="filterTransactions('all', this)">All</button>
      <button class="filter-btn" data-filter="deposit" onclick="filterTransactions('deposit', this)">Deposits</button>
      <button class="filter-btn" data-filter="withdraw" onclick="filterTransactions('withdraw', this)">Withdrawals</button>
      <button class="filter-btn" data-filter="bonus" onclick="filterTransactions('bonus', this)">Bonuses</button>
    </div>

    <!-- Loading Spinner -->
    <div class="loading-spinner" id="loadingSpinner">
      <div class="spinner"></div>
    </div>

    <!-- Transaction List -->
    <div class="txn-list" id="txnList" style="display:none;"></div>

    <!-- Empty State -->
    <div class="empty-state" id="emptyState" style="display:none;">
      <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 3c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm7 13H5v-.23c0-.62.28-1.2.76-1.58C7.47 15.82 9.64 15 12 15s4.53.82 6.24 2.19c.48.38.76.97.76 1.58V19z"/></svg>
      <h3>No Transactions Found</h3>
      <p>Your transaction history will appear here</p>
    </div>
  </div>

  <footer>© 2026 ishareprofit | All right reserved.</footer>

  <div class="toast" id="toast"></div>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getFirestore,
      collection,
      query,
      where,
      getDocs,
      orderBy,
      limit
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBTkls-WbffHErGeX9bMYPpV5pqbCe14gY",
      authDomain: "datacash-104dd.firebaseapp.com",
      projectId: "datacash-104dd",
      storageBucket: "datacash-104dd.firebasestorage.app",
      messagingSenderId: "101692098149",
      appId: "1:101692098149:web:55ccc9f1f105647488a88c"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);

    /* ── Session Check ── */
    const raw = sessionStorage.getItem('ishareUser');
    if (!raw) window.location.href = 'login.html';
    const user = JSON.parse(raw || '{}');

    /* ── Toast ── */
    function showToast(msg, type = '') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className   = 'toast show ' + type;
      setTimeout(() => { t.className = 'toast'; }, 3500);
    }

    /* ── Store all transactions ── */
    let allTransactions = [];

    /* ── Fetch Transactions ── */
    async function fetchTransactions() {
      const loadingSpinner = document.getElementById('loadingSpinner');
      const txnList        = document.getElementById('txnList');
      const emptyState     = document.getElementById('emptyState');

      loadingSpinner.style.display = 'block';
      txnList.style.display        = 'none';
      emptyState.style.display     = 'none';

      allTransactions = [];

      try {
        const username = user.username;

        // Fetch deposits
        const depositQuery = query(
          collection(db, 'deposits'),
          where('username', '==', username)
        );
        const depositSnap = await getDocs(depositQuery);
        depositSnap.forEach(doc => {
          const data = doc.data();
          allTransactions.push({
            id: doc.id,
            type: 'Deposit',
            category: 'deposit',
            amount: data.amount || '₦0.00',
            status: data.status || 'pending',
            date: data.submittedAt ? data.submittedAt.toDate() : new Date(),
            plan: data.plan || ''
          });
        });

        // Fetch withdrawals
        const withdrawQuery = query(
          collection(db, 'withdrawals'),
          where('username', '==', username)
        );
        const withdrawSnap = await getDocs(withdrawQuery);
        withdrawSnap.forEach(doc => {
          const data = doc.data();
          allTransactions.push({
            id: doc.id,
            type: 'Withdrawal',
            category: 'withdraw',
            amount: data.amount || '₦0.00',
            status: data.status || 'pending',
            date: data.requestedAt ? data.requestedAt.toDate() : new Date(),
            method: data.method || ''
          });
        });

        // Fetch bonuses (if any)
        const bonusQuery = query(
          collection(db, 'bonuses'),
          where('username', '==', username)
        );
        const bonusSnap = await getDocs(bonusQuery);
        bonusSnap.forEach(doc => {
          const data = doc.data();
          allTransactions.push({
            id: doc.id,
            type: 'Bonus',
            category: 'bonus',
            amount: data.amount || '₦0.00',
            status: 'completed',
            date: data.createdAt ? data.createdAt.toDate() : new Date(),
            description: data.description || 'Referral Bonus'
          });
        });

        // Sort by date (newest first)
        allTransactions.sort((a, b) => b.date - a.date);

        renderTransactions('all');
        loadingSpinner.style.display = 'none';

      } catch (err) {
        console.error('Error fetching transactions:', err);
        showToast('Failed to load transactions.', 'error');
        loadingSpinner.style.display = 'none';
        emptyState.style.display = 'block';
      }
    }

    /* ── Render Transactions ── */
    function renderTransactions(filter = 'all') {
      const txnList    = document.getElementById('txnList');
      const emptyState = document.getElementById('emptyState');
      const txnCount   = document.getElementById('txnCount');

      let filtered = allTransactions;
      if (filter !== 'all') {
        filtered = allTransactions.filter(t => t.category === filter);
      }

      txnCount.textContent = filtered.length;

      if (filtered.length === 0) {
        txnList.style.display    = 'none';
        emptyState.style.display = 'block';
        return;
      }

      emptyState.style.display = 'none';
      txnList.style.display    = 'flex';

      txnList.innerHTML = filtered.map(txn => {
        const isCredit = (txn.category === 'deposit' || txn.category === 'bonus');
        const amountClass = isCredit ? 'credit' : 'debit';
        const amountPrefix = isCredit ? '+' : '-';
        
        const iconSvg = txn.category === 'deposit' 
          ? '<svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>'
          : txn.category === 'withdraw'
          ? '<svg viewBox="0 0 24 24"><path d="M19 13H5v-2h14v2z"/></svg>'
          : '<svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>';

        const formattedDate = formatDate(txn.date);
        const formattedTime = formatTime(txn.date);
        const statusClass = txn.status === 'completed' ? 'completed' 
                          : txn.status === 'pending' ? 'pending' 
                          : 'failed';

        return `
          <div class="txn-item">
            <div class="txn-icon ${txn.category}">
              ${iconSvg}
            </div>
            <div class="txn-info">
              <div class="txn-type">${txn.type}${txn.plan ? ' - ' + txn.plan : ''}${txn.method ? ' via ' + txn.method : ''}</div>
              <div class="txn-date">${formattedDate} at ${formattedTime}</div>
            </div>
            <div class="txn-amount ${amountClass}">${amountPrefix}${txn.amount}</div>
            <span class="txn-status ${statusClass}">${txn.status}</span>
          </div>
        `;
      }).join('');
    }

    /* ── Filter Transactions ── */
    window.filterTransactions = function (filter, btn) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderTransactions(filter);
    };

    /* ── Format Date ── */
    function formatDate(date) {
      const options = { year: 'numeric', month: 'short', day: 'numeric' };
      return date.toLocaleDateString('en-NG', options);
    }

    /* ── Format Time ── */
    function formatTime(date) {
      const options = { hour: '2-digit', minute: '2-digit' };
      return date.toLocaleTimeString('en-NG', options);
    }

    /* ── Logout ── */
    window.logout = function () { sessionStorage.removeItem('ishareUser'); };

    /* ── Load transactions on page load ── */
    fetchTransactions();

  </script>

  <script>
    function openSidebar() {
      document.getElementById('sidebar').classList.add('open');
      document.getElementById('overlay').classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeSidebar() {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('overlay').classList.remove('open');
      document.body.style.overflow = '';
    }
  </script>
</body>
</html>
