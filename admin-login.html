<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>iShareProfit – Admin Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0d1b3e;
      font-family: 'Segoe UI', Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* ══ BACKGROUND DECORATION ══ */
    .bg-circle-1 {
      position: fixed; top: -120px; right: -80px;
      width: 300px; height: 300px; border-radius: 50%;
      background: rgba(37, 99, 235, 0.08); z-index: 0;
    }
    .bg-circle-2 {
      position: fixed; bottom: -100px; left: -60px;
      width: 250px; height: 250px; border-radius: 50%;
      background: rgba(37, 99, 235, 0.06); z-index: 0;
    }

    /* ══ LOGO ══ */
    .logo-wrap {
      position: relative; z-index: 1;
      margin-bottom: 12px;
      text-align: center;
    }
    .logo-wrap img {
      height: 80px; object-fit: contain;
    }

    /* ══ ADMIN BADGE ══ */
    .admin-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,.08); color: #94a3b8;
      padding: 8px 18px; border-radius: 30px;
      font-size: 13px; font-weight: 600;
      letter-spacing: 1px; margin-bottom: 28px;
      position: relative; z-index: 1;
      border: 1px solid rgba(255,255,255,.1);
    }
    .admin-badge svg { width: 16px; height: 16px; fill: #f59e0b; }

    /* ══ CARD ══ */
    .card {
      background: #fff;
      border-radius: 20px;
      width: 100%;
      max-width: 420px;
      padding: 36px 28px 34px;
      position: relative; z-index: 1;
      box-shadow: 0 20px 60px rgba(0,0,0,.3);
    }

    .card h1 {
      text-align: center;
      font-size: 24px;
      font-weight: 800;
      color: #1a1a2e;
      margin-bottom: 6px;
      letter-spacing: 0.2px;
    }

    .card .subtitle {
      text-align: center;
      font-size: 13px;
      color: #888;
      margin-bottom: 26px;
      font-weight: 500;
    }

    .field-label {
      font-size: 14px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 7px;
      display: block;
    }

    .field {
      width: 100%;
      padding: 15px 16px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      font-size: 15px;
      color: #333;
      background: #f8f9fa;
      margin-bottom: 20px;
      outline: none;
      transition: border-color .2s, background .2s;
    }
    .field::placeholder { color: #aaa; }
    .field:focus {
      border-color: #1a2a6c;
      background: #fff;
    }

    /* ══ REMEMBER ROW ══ */
    .remember-row {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 24px; margin-top: -6px;
    }
    .remember-row input[type="checkbox"] {
      width: 16px; height: 16px; accent-color: #1a2a6c; cursor: pointer;
    }
    .remember-row label {
      font-size: 13px; color: #666; cursor: pointer; font-weight: 500;
    }

    /* ══ SIGN IN BUTTON ══ */
    .signin-btn {
      width: 100%;
      display: block;
      padding: 16px;
      background: #1a2a6c;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      text-align: center;
      box-shadow: 0 4px 20px rgba(26,42,108,.35);
      transition: background .2s, transform .1s;
      margin-bottom: 10px;
    }
    .signin-btn:hover { background: #15235a; }
    .signin-btn:active { transform: scale(.97); }
    .signin-btn:disabled { opacity: .6; cursor: not-allowed; }

    /* ══ BACK LINK ══ */
    .back-link {
      text-align: center; display: block;
      font-size: 13px; color: #888;
      text-decoration: none; margin-top: 12px;
      font-weight: 500; transition: color .2s;
    }
    .back-link:hover { color: #1a2a6c; }

    /* ══ TOAST ══ */
    .toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1a1a2e; color: #fff; padding: 12px 22px;
      border-radius: 30px; font-size: 14px; opacity: 0;
      transition: all .35s ease; z-index: 9999; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.success { background: #28a745; }
    .toast.error   { background: #dc3545; }

    /* ══ SPINNER ══ */
    .spinner {
      display: inline-block; width: 18px; height: 18px;
      border: 3px solid rgba(255,255,255,.4); border-top-color: #fff;
      border-radius: 50%; animation: spin .7s linear infinite;
      vertical-align: middle; margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ══ FOOTER ══ */
    .footer-text {
      position: relative; z-index: 1;
      text-align: center; font-size: 12px;
      color: rgba(255,255,255,.4); margin-top: 24px;
    }
  </style>
</head>
<body>

  <!-- Background Decoration -->
  <div class="bg-circle-1"></div>
  <div class="bg-circle-2"></div>

  <!-- Logo -->
  <div class="logo-wrap">
    <img src="image.jpg" alt="iShareProfit Logo"/>
  </div>

  <!-- Admin Badge -->
  <div class="admin-badge">
    <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 4a3 3 0 1 1 0 6 3 3 0 0 1 0-6zm0 14c-2.67 0-5.01-1.37-6.4-3.44.75-1.1 3.45-1.56 6.4-1.56s5.65.46 6.4 1.56C17.01 17.63 14.67 19 12 19z"/></svg>
    ADMIN PANEL
  </div>

  <!-- Card -->
  <div class="card">
    <h1>Admin Login</h1>
    <p class="subtitle">Enter your credentials to access the panel</p>

    <label class="field-label" for="username">Admin Username</label>
    <input class="field" id="username" type="text" placeholder="Enter admin username" autocomplete="username"/>

    <label class="field-label" for="password">Password</label>
    <input class="field" id="password" type="password" placeholder="Enter admin password" autocomplete="current-password"/>

    <div class="remember-row">
      <input type="checkbox" id="remember"/>
      <label for="remember">Remember me</label>
    </div>

    <button class="signin-btn" id="signinBtn" onclick="handleAdminLogin()">Sign In</button>

    <a href="login.html" class="back-link">← Back to User Login</a>
  </div>

  <!-- Footer -->
  <p class="footer-text">© 2026 ishareprofit | Admin Panel</p>

  <div class="toast" id="toast"></div>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getFirestore,
      collection,
      query,
      where,
      getDocs,
      doc,
      updateDoc,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBTkls-WbffHErGeX9bMYPpV5pqbCe14gY",
      authDomain: "datacash-104dd.firebaseapp.com",
      projectId: "datacash-104dd",
      storageBucket: "datacash-104dd.firebasestorage.app",
      messagingSenderId: "101692098149",
      appId: "1:101692098149:web:55ccc9f1f105647488a88c"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);

    /* ── Toast ── */
    function showToast(msg, type = '') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className   = 'toast show ' + type;
      setTimeout(() => { t.className = 'toast'; }, 3500);
    }

    /* ── Admin Login Handler ── */
    window.handleAdminLogin = async function () {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const remember = document.getElementById('remember').checked;
      const btn      = document.getElementById('signinBtn');

      if (!username || !password) {
        return showToast('Please fill in all fields.', 'error');
      }

      btn.disabled  = true;
      btn.innerHTML = '<span class="spinner"></span>Signing in…';

      try {
        // Query admins collection for matching credentials
        const q = query(
          collection(db, 'admins'),
          where('username', '==', username),
          where('password', '==', password)
        );
        const snap = await getDocs(q);

        if (snap.empty) {
          showToast('Invalid admin credentials.', 'error');
          btn.disabled  = false;
          btn.innerHTML = 'Sign In';
          return;
        }

        // Admin found
        const adminData = snap.docs[0].data();
        const adminId   = snap.docs[0].id;

        // Update last login timestamp
        await updateDoc(doc(db, 'admins', adminId), {
          lastLogin: serverTimestamp()
        });

        // Store admin session
        const adminSession = {
          uid:      adminId,
          username: adminData.username,
          email:    adminData.email || '',
          role:     adminData.role || 'admin',
          loggedInAt: new Date().toISOString()
        };

        // Use sessionStorage (or localStorage if "Remember me" is checked)
        if (remember) {
          localStorage.setItem('ishareAdmin', JSON.stringify(adminSession));
        } else {
          sessionStorage.setItem('ishareAdmin', JSON.stringify(adminSession));
        }

        showToast('Login successful! Redirecting…', 'success');
        setTimeout(() => {
          window.location.href = 'admin-dashboard.html';
        }, 1500);

      } catch (err) {
        console.error('Admin login error:', err);
        showToast('Login error: ' + err.message, 'error');
        btn.disabled  = false;
        btn.innerHTML = 'Sign In';
      }
    };

    /* ── Auto-fill if "Remember me" was used ── */
    (function checkRemembered() {
      const remembered = localStorage.getItem('ishareAdmin');
      if (remembered) {
        try {
          const data = JSON.parse(remembered);
          if (data.username) {
            document.getElementById('username').value = data.username;
            document.getElementById('remember').checked = true;
          }
        } catch (e) {}
      }
    })();

  </script>
</body>
</html>
