<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>iShareProfit – Change Password</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f2f8;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ══ SIDEBAR ══ */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.45); z-index: 200;
    }
    .overlay.open { display: block; }

    .sidebar {
      position: fixed; top: 0; left: 0;
      width: 290px; height: 100%;
      background: linear-gradient(180deg,#1a2a6c,#1e3a8a 60%,#1a2a6c);
      z-index: 300; transform: translateX(-100%);
      transition: transform .3s ease;
      display: flex; flex-direction: column;
    }
    .sidebar.open { transform: translateX(0); }

    .sidebar-logo {
      background:#000; padding:18px 20px;
      display:flex; align-items:center; justify-content:space-between;
    }
    .sidebar-logo img { height:60px; object-fit:contain; }
    .sidebar-close {
      color:#fff; font-size:26px; cursor:pointer;
      background:none; border:none;
    }
    .nav-list { padding:14px 0; flex:1; }
    .nav-item {
      display:flex; align-items:center; gap:16px;
      padding:16px 22px; color:#fff; font-size:17px; font-weight:500;
      cursor:pointer; text-decoration:none; transition:background .2s;
    }
    .nav-item:hover { background:rgba(255,255,255,.08); }
    .nav-item.active {
      background:#2563eb; border-radius:0 30px 30px 0; margin-right:20px;
    }
    .nav-icon {
      width:42px; height:42px; border:2px solid rgba(255,255,255,.5);
      border-radius:10px; display:flex; align-items:center;
      justify-content:center; flex-shrink:0;
    }
    .nav-item.active .nav-icon {
      background:rgba(255,255,255,.15); border-color:rgba(255,255,255,.8);
    }
    .nav-icon svg { width:22px; height:22px; fill:#fff; }
    .nav-arrow { margin-left:auto; font-size:18px; color:rgba(255,255,255,.6); }

    /* ══ HEADER ══ */
    .top-header {
      background:linear-gradient(135deg,#1a2a6c,#1e3a8a);
      padding:14px 18px; display:flex; align-items:center;
      justify-content:space-between; position:sticky; top:0; z-index:100;
    }
    .avatar {
      width:44px; height:44px; border-radius:50%;
      background:rgba(255,255,255,.25);
      display:flex; align-items:center; justify-content:center;
    }
    .avatar svg { width:36px; height:36px; fill:rgba(255,255,255,.8); }
    .hamburger {
      background:none; border:none; cursor:pointer;
      display:flex; flex-direction:column; gap:5px; padding:4px;
    }
    .hamburger span { display:block; width:26px; height:3px; background:#fff; border-radius:3px; }

    /* ══ BANNER ══ */
    .dash-banner {
      background:linear-gradient(135deg,#1b5e20,#2e7d32,#1b5e20);
      padding:22px 20px 50px;
    }
    .dash-banner h1 { color:#fff; font-size:28px; font-weight:700; margin-bottom:6px; }
    .breadcrumb {
      color:rgba(255,255,255,.75); font-size:13px; font-weight:500;
      letter-spacing:.5px; display:flex; align-items:center; gap:8px;
    }
    .breadcrumb span { color:rgba(255,255,255,.5); }

    /* ══ CARD ══ */
    .card {
      background:#fff; border-radius:20px 20px 0 0;
      margin:-28px 0 0; padding:28px 20px 36px;
      min-height: 50vh;
    }

    /* Section Header */
    .section-header {
      background: #f1f4f9; padding: 14px 18px;
      border-radius: 8px; color: #1a1a2e;
      font-weight: 700; font-size: 15px;
      margin-bottom: 22px; display: flex; align-items: center;
      gap: 10px;
    }
    .section-header svg { width: 20px; height: 20px; fill: #2e7d32; }

    /* Note box */
    .note-box {
      background:#e8f5e9; border:1px solid #c8e6c9;
      color:#2e7d32; padding:14px 16px; border-radius:10px;
      font-size:13px; margin-bottom:20px; line-height:1.5;
      display:flex; align-items:flex-start; gap:10px;
    }
    .note-box svg { width:20px; height:20px; flex-shrink:0; margin-top:1px; fill:#2e7d32; }

    /* Form Groups */
    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block; font-size: 14px; color: #555;
      font-weight: 600; margin-bottom: 7px;
    }
    .form-control {
      width: 100%; padding: 14px 16px;
      border: 1.5px solid #d0d0d0;
      border-radius: 8px; font-size: 15px;
      color: #333; outline: none;
      background: #fafafa; transition: border-color .2s, background .2s;
    }
    .form-control:focus { border-color: #2e7d32; background: #fff; }
    .form-control::placeholder { color: #aaa; }

    /* Password strength indicator */
    .password-strength {
      height: 4px; border-radius: 2px;
      margin-top: 8px; transition: all .3s;
      background: #e0e0e0;
    }
    .password-strength.weak   { background: #dc3545; width: 33%; }
    .password-strength.medium { background: #ffc107; width: 66%; }
    .password-strength.strong { background: #28a745; width: 100%; }

    /* Update Button */
    .btn-update {
      width: 100%; background: #2e7d32; color: #fff;
      padding: 15px; border: none;
      border-radius: 8px; font-size: 16px;
      font-weight: 700; cursor: pointer;
      transition: background .2s, transform .1s;
      box-shadow: 0 4px 18px rgba(46,125,50,.3);
      margin-top: 6px;
    }
    .btn-update:hover { background: #1b5e20; }
    .btn-update:active { transform: scale(.97); }
    .btn-update:disabled { opacity: .6; cursor: not-allowed; }

    /* Toast */
    .toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1a1a2e; color: #fff; padding: 12px 22px;
      border-radius: 30px; font-size: 14px; opacity: 0;
      transition: all .35s ease; z-index: 9999; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.success { background: #28a745; }
    .toast.error   { background: #dc3545; }

    /* Spinner */
    .spinner {
      display: inline-block; width: 18px; height: 18px;
      border: 3px solid rgba(255,255,255,.4); border-top-color: #fff;
      border-radius: 50%; animation: spin .7s linear infinite;
      vertical-align: middle; margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Footer */
    footer {
      text-align: center; padding: 20px;
      font-size: 13px; color: #888;
      background: #f0f2f8;
    }
  </style>
</head>
<body>

  <!-- OVERLAY -->
  <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <img src="image.jpg" alt="iShareProfit"/>
      <button class="sidebar-close" onclick="closeSidebar()">✕</button>
    </div>
    <nav class="nav-list">
      <a href="home.html" class="nav-item">
        <div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></div>
        Dashboard <span class="nav-arrow">›</span>
      </a>
      <a href="deposit.html" class="nav-item">
        <div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M21 18v1a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v1h-9a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h9zm-9-2h10V8H12v8zm4-2.5a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3z"/></svg></div>
        Deposit <span class="nav-arrow">›</span>
      </a>
      <a href="transactions.html" class="nav-item">
        <div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 3c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm7 13H5v-.23c0-.62.28-1.2.76-1.58C7.47 15.82 9.64 15 12 15s4.53.82 6.24 2.19c.48.38.76.97.76 1.58V19z"/></svg></div>
        Transactions <span class="nav-arrow">›</span>
      </a>
      <a href="withdraw.html" class="nav-item">
        <div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M20 4H4c-1.11 0-2 .89-2 2v12c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z"/></svg></div>
        Withdraw <span class="nav-arrow">›</span>
      </a>
      <a href="settings.html" class="nav-item">
        <div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.06-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96a6.96 6.96 0 0 0-1.62-.94l-.36-2.54A.484.484 0 0 0 14 2h-4a.484.484 0 0 0-.48.41l-.36 2.54a7.3 7.3 0 0 0-1.62.94l-2.39-.96a.48.48 0 0 0-.59.22L2.74 8.87a.48.48 0 0 0 .12.61l2.03 1.58c-.04.3-.06.62-.06.94s.02.64.06.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.36 1.04.67 1.62.94l.36 2.54c.05.24.27.41.48.41h4c.24 0 .44-.17.48-.41l.36-2.54a7.3 7.3 0 0 0 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32a.49.49 0 0 0-.12-.61l-2.03-1.58zM12 15.6a3.6 3.6 0 1 1 0-7.2 3.6 3.6 0 0 1 0 7.2z"/></svg></div>
        Settings <span class="nav-arrow">›</span>
      </a>
      <a href="security.html" class="nav-item active">
        <div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 4a3 3 0 1 1 0 6 3 3 0 0 1 0-6zm0 14c-2.67 0-5.01-1.37-6.4-3.44.75-1.1 3.45-1.56 6.4-1.56s5.65.46 6.4 1.56C17.01 17.63 14.67 19 12 19z"/></svg></div>
        Security <span class="nav-arrow">›</span>
      </a>
      <a href="login.html" class="nav-item" onclick="logout()">
        <div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M10.09 15.59L11.5 17l5-5-5-5-1.41 1.41L12.67 11H3v2h9.67l-2.58 2.59zM19 3H5a2 2 0 0 0-2 2v4h2V5h14v14H5v-4H3v4a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2z"/></svg></div>
        Logout <span class="nav-arrow">›</span>
      </a>

  </div>

  <!-- ══════════════ MAIN CONTENT ══════════════ -->
  <div class="top-header">
    <div class="avatar">
      <svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
    </div>
    <button class="hamburger" onclick="openSidebar()">
      <span></span><span></span><span></span>
    </button>
  </div>

  <div class="dash-banner">
    <h1>Change Password</h1>
    <div class="breadcrumb">HOME <span>→</span> CHANGE PASSWORD</div>
  </div>

  <div class="card">
    <div class="section-header">
      <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1s3.1 1.39 3.1 3.1v2z"/></svg>
      Change Password
    </div>

    <!-- Note -->
    <div class="note-box">
      <svg viewBox="0 0 24 24"><path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/></svg>
      <span>Password must be at least 6 characters long. Use a mix of letters, numbers, and symbols for better security.</span>
    </div>

    <!-- Form -->
    <div class="form-group">
      <label>Current Password</label>
      <input type="password" id="currentPassword" class="form-control" placeholder="Enter current password">
    </div>

    <div class="form-group">
      <label>New Password</label>
      <input type="password" id="newPassword" class="form-control" 
             placeholder="Enter new password" oninput="checkPasswordStrength()">
      <div class="password-strength" id="passwordStrength"></div>
    </div>

    <div class="form-group">
      <label>Retype New Password</label>
      <input type="password" id="retypePassword" class="form-control" placeholder="Confirm new password">
    </div>

    <button class="btn-update" id="updateBtn" onclick="updatePassword()">Update Password</button>
  </div>

  <footer>© 2026 ishareprofit | All right reserved.</footer>

  <div class="toast" id="toast"></div>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getFirestore,
      doc,
      getDoc,
      updateDoc,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBTkls-WbffHErGeX9bMYPpV5pqbCe14gY",
      authDomain: "datacash-104dd.firebaseapp.com",
      projectId: "datacash-104dd",
      storageBucket: "datacash-104dd.firebasestorage.app",
      messagingSenderId: "101692098149",
      appId: "1:101692098149:web:55ccc9f1f105647488a88c"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);

    /* ── Session Check ── */
    const raw = sessionStorage.getItem('ishareUser');
    if (!raw) window.location.href = 'login.html';
    const user = JSON.parse(raw || '{}');

    /* ── Toast ── */
    function showToast(msg, type = '') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className   = 'toast show ' + type;
      setTimeout(() => { t.className = 'toast'; }, 3500);
    }

    /* ── Password Strength Checker ── */
    window.checkPasswordStrength = function () {
      const password = document.getElementById('newPassword').value;
      const strengthBar = document.getElementById('passwordStrength');
      
      strengthBar.className = 'password-strength';
      
      if (password.length === 0) return;
      
      let score = 0;
      
      if (password.length >= 6) score++;
      if (password.length >= 10) score++;
      if (/[a-z]/.test(password) && /[A-Z]/.test(password)) score++;
      if (/\d/.test(password)) score++;
      if (/[!@#$%^&*(),.?":{}|<>]/.test(password)) score++;
      
      if (score <= 2) {
        strengthBar.classList.add('weak');
      } else if (score <= 4) {
        strengthBar.classList.add('medium');
      } else {
        strengthBar.classList.add('strong');
      }
    };

    /* ── Update Password ── */
    window.updatePassword = async function () {
      const currentPass = document.getElementById('currentPassword').value;
      const newPass     = document.getElementById('newPassword').value;
      const retypePass  = document.getElementById('retypePassword').value;
      const btn         = document.getElementById('updateBtn');

      if (!currentPass || !newPass || !retypePass) {
        return showToast('Please fill in all password fields.', 'error');
      }

      if (newPass.length < 6) {
        return showToast('New password must be at least 6 characters.', 'error');
      }

      if (newPass !== retypePass) {
        return showToast('New Password and Retype Password do not match.', 'error');
      }

      btn.disabled  = true;
      btn.innerHTML = '<span class="spinner"></span>Updating…';

      try {
        const userRef  = doc(db, 'users', user.uid);
        const userSnap = await getDoc(userRef);

        if (!userSnap.exists()) {
          showToast('User account not found.', 'error');
          btn.disabled  = false;
          btn.innerHTML = 'Update Password';
          return;
        }

        const userData = userSnap.data();

        if (userData.password !== currentPass) {
          showToast('Current password is incorrect.', 'error');
          btn.disabled  = false;
          btn.innerHTML = 'Update Password';
          return;
        }

        if (currentPass === newPass) {
          showToast('New password must be different from current password.', 'error');
          btn.disabled  = false;
          btn.innerHTML = 'Update Password';
          return;
        }

        await updateDoc(userRef, {
          password: newPass,
          passwordUpdatedAt: serverTimestamp()
        });

        showToast('Password updated successfully!', 'success');

        document.getElementById('currentPassword').value = '';
        document.getElementById('newPassword').value = '';
        document.getElementById('retypePassword').value = '';
        document.getElementById('passwordStrength').className = 'password-strength';

      } catch (err) {
        console.error('Password update error:', err);
        showToast('Failed to update password: ' + err.message, 'error');
      }

      btn.disabled  = false;
      btn.innerHTML = 'Update Password';
    };

    /* ── Logout ── */
    window.logout = function () { sessionStorage.removeItem('ishareUser'); };

  </script>

  <script>
    function openSidebar() {
      document.getElementById('sidebar').classList.add('open');
      document.getElementById('overlay').classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeSidebar() {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('overlay').classList.remove('open');
      document.body.style.overflow = '';
    }
  </script>
</body>
</html>
